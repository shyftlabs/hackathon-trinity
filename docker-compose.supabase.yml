# ──────────────────────────────────────────────────────────────────────────────
# Synapse AI — minimal self-hosted Supabase stack for local dev
#
#   supabase-db    Postgres 15 (roles + Synapse schema auto-applied on first boot)
#   supabase-rest  PostgREST — serves the public schema as a REST API
#   supabase-kong  nginx gateway routing /rest/v1/* → PostgREST (the URL the
#                  supabase-py client expects at SUPABASE_URL)
#
# Start:   docker compose -f docker-compose.supabase.yml up -d
# Stop:    docker compose -f docker-compose.supabase.yml down
# Reset:   docker compose -f docker-compose.supabase.yml down -v   (wipes data)
#
# SUPABASE_URL                = http://localhost:54321
# JWT secret                  = super-secret-jwt-token-with-at-least-32-characters-long
# anon / service_role keys    = standard Supabase demo keys (see api/.env)
# ──────────────────────────────────────────────────────────────────────────────
services:
  supabase-db:
    image: postgres:15-alpine
    container_name: synapse-supabase-db
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./supabase/docker/init:/docker-entrypoint-initdb.d:ro
      - ./supabase/docker/db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: synapse-supabase-rest
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"

  supabase-kong:
    image: nginx:alpine
    container_name: synapse-supabase-kong
    restart: unless-stopped
    depends_on:
      - supabase-rest
    ports:
      - "54321:8000"
    volumes:
      - ./supabase/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
