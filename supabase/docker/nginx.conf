# Gateway that mimics the Supabase API surface the supabase-py client expects.
# The client calls {SUPABASE_URL}/rest/v1/<table>; PostgREST serves tables at /.
server {
    listen 8000;
    server_name _;

    # PostgREST — table/RPC access
    location /rest/v1/ {
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://supabase-rest:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
        proxy_set_header Accept-Profile $http_accept_profile;
        proxy_set_header Content-Profile $http_content_profile;
        proxy_set_header Prefer $http_prefer;
    }

    location = /rest/v1 {
        return 301 /rest/v1/;
    }

    # Health check
    location / {
        return 200 'synapse supabase gateway ok';
        add_header Content-Type text/plain;
    }
}
